# jobwatch configuration.
# Copy to config.yaml, adjust the notifiers section, and run:
#   jobwatch -seed     (first run: baseline, no emails)
#   jobwatch           (every run after: emails newly appeared matches)
#
# Every company below was probed and its API verified live (2026-07-16).
# The initial set came from https://github.com/yanirs/established-remote;
# 139 boards were imported from moreThanFAANGM after auditing all 483 links.
# See catalog/morethanfaangm-audit.tsv for the evidence and exclusions.

poll:
  timeout_seconds: 30
  concurrency: 6 # companies fetched in parallel

# The matching rule. Matchers compose via all/any/not — see README
# "Change what counts as a match" for the full catalog.
matcher:
  name: all
  of:
    # Your experience must fall INSIDE the range the posting states:
    # with years: 1 -> "0-1", "1-3", "0-3", "1+" match; "2+", "3-5" don't.
    - name: experience
      params:
        years: 1
        notify_when_unlisted: true # postings that list no experience also notify
    # Full-time roles only (ATSes that don't state a type still pass).
    - name: employment
      params: {types: "full-time"}
    # Cheap title prefilter mirroring the llm's own role rule — it cuts
    # LLM calls ~5x by vetoing non-engineering titles before they cost an
    # API call. Seniority is deliberately NOT filtered here; the llm
    # judges that with full context.
    - name: keywords
      params:
        field: title
        include: "engineer, engineering, developer, sde, sre, devops, software, backend, platform, infrastructure"
    # Final judge: a language model reviews every job the rules above let
    # through. Any OpenAI-compatible endpoint works (OpenAI, Anthropic,
    # Groq, OpenRouter, local Ollama); this uses Google Gemini. Keep it
    # LAST under `of:` — cheap matchers veto first, so the LLM is only
    # called for jobs that already passed them, and -seed never calls it.
    - name: llm
      params:
        base_url: https://generativelanguage.googleapis.com/v1beta/openai
        model: gemini-2.5-flash
        api_key_env: JOBWATCH_LLM_API_KEY
        max_tokens: 2000 # room for reasoning + the thorough explanation
        profile: >-
          Early-career backend engineer with 1 year of professional software
          development experience, based in India (IST). Target roles: Backend
          Engineer, Backend Software Engineer, Software Engineer - Backend,
          Software Development Engineer I (SDE 1), Software Engineer I,
          Software Engineer, Software Developer - Backend, Associate Software
          Engineer, Associate Software Developer, Junior Backend Engineer,
          Platform Engineer, DevOps Engineer, or equivalent titles.
        instructions: >-
          Match ONLY when both conditions hold. (1) The title is one of the
          target roles or an equivalent entry-level backend/platform/devops
          engineering role - reject senior, staff, lead, principal, manager,
          and unrelated disciplines. (2) The posting explicitly states a
          required experience level, and 1 year of experience falls INSIDE
          the stated range: "0-1 years", "1-3 years", "0-3 years", and "1+
          years" all fit; "2+ years", "3-5 years", or seniority wording
          implying more do not. If the posting does not mention any required
          years of experience at all, do NOT match - skip it. In the reason,
          explain thoroughly: quote the exact experience wording from the
          posting, state the range it implies, say why 1 year is inside or
          outside that range, and how the title maps to the target roles.

# ${VAR} values are read from the environment (GitHub Secrets in CI).
# Running locally you can either export the same variables or replace the
# ${...} placeholders with literal values.
notifiers:
  - name: console # always handy; cron mails stdout on its own
  - name: email
    params:
      smtp_host: smtp.gmail.com
      smtp_port: 587
      username: ${JOBWATCH_SMTP_USERNAME}
      password_env: JOBWATCH_SMTP_PASSWORD
      from: ${JOBWATCH_SMTP_USERNAME}
      to: ${JOBWATCH_EMAIL_TO} # comma-separate for more recipients
  # More channels — uncomment what you use (see README "Notifications"):
  # - name: webhook
  #   params: {url_env: JOBWATCH_SLACK_WEBHOOK, format: slack}
  # - name: webhook
  #   params: {url_env: JOBWATCH_DISCORD_WEBHOOK, format: discord}
  # - name: telegram
  #   params: {token_env: JOBWATCH_TELEGRAM_TOKEN, chat_id: "123456789"}

store:
  path: ~/.jobwatch/state.json

