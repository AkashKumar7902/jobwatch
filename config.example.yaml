# jobwatch configuration.
# Copy to config.yaml, adjust the notifiers section, and run:
#   jobwatch -seed     (first run: baseline, no emails)
#   jobwatch           (every run after: emails newly appeared matches)
#
# Every company below was probed and its API verified live (2026-07-16),
# starting from https://github.com/yanirs/established-remote.

poll:
  timeout_seconds: 30
  concurrency: 6 # companies fetched in parallel

# The matching rule. Matchers compose via all/any/not — see README
# "Change what counts as a match" for the full catalog.
matcher:
  name: all
  of:
    # Your experience must fall INSIDE the range the posting states:
    # with years: 1 -> "0-1", "1-3", "0-3", "1+" match; "2+", "3-5" don't.
    - name: experience
      params:
        years: 1
        notify_when_unlisted: true # postings that list no experience also notify
    # Full-time roles only (ATSes that don't state a type still pass).
    - name: employment
      params: {types: "full-time"}
# Tighter still (add under `of:` above): engineering titles, nothing senior.
#   - name: keywords
#     params:
#       field: title
#       include: "engineer, engineering, developer, sre, devops, software, backend, frontend, full stack, data, ml, ai"
#       exclude: "senior, staff, principal, lead, manager, director, head, vp"
# Or let a language model judge fit against your profile. Works with any
# OpenAI-compatible endpoint (OpenAI, Anthropic, Groq, OpenRouter, local
# Ollama). Keep it LAST under `of:` so cheap matchers filter first and the
# LLM is only called for jobs that already passed them.
#   - name: llm
#     params:
#       profile: "Backend engineer with 1 year of Go/Python experience, based in India, needs remote roles open to India"
#       base_url: https://api.openai.com/v1 # or http://localhost:11434/v1 for free local Ollama
#       model: gpt-4o-mini
#       api_key_env: OPENAI_API_KEY # omit for keyless endpoints

# ${VAR} values are read from the environment (GitHub Secrets in CI).
# Running locally you can either export the same variables or replace the
# ${...} placeholders with literal values.
notifiers:
  - name: console # always handy; cron mails stdout on its own
  - name: email
    params:
      smtp_host: smtp.gmail.com
      smtp_port: 587
      username: ${JOBWATCH_SMTP_USERNAME}
      password_env: JOBWATCH_SMTP_PASSWORD
      from: ${JOBWATCH_SMTP_USERNAME}
      to: ${JOBWATCH_EMAIL_TO} # comma-separate for more recipients
  # More channels — uncomment what you use (see README "Notifications"):
  # - name: webhook
  #   params: {url_env: JOBWATCH_SLACK_WEBHOOK, format: slack}
  # - name: webhook
  #   params: {url_env: JOBWATCH_DISCORD_WEBHOOK, format: discord}
  # - name: telegram
  #   params: {token_env: JOBWATCH_TELEGRAM_TOKEN, chat_id: "123456789"}

store:
  path: ~/.jobwatch/state.json

